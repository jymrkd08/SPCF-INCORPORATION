<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Nurses | SPCF Medical Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a2540;
            --ocean: #0077b6;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(rgba(10, 37, 64, 0.6), rgba(10, 37, 64, 0.6)), 
                        url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        /* Back Button Style */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: var(--white);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateX(-5px);
        }

        header { text-align: center; margin-top: 2rem; }

        h1 { 
            font-family: 'Playfair Display', serif;
            color: var(--white); 
            margin-bottom: 0.5rem; 
            font-size: 2.5rem;
        }

        p { color: var(--white); margin-bottom: 3rem; opacity: 0.9; }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 4rem;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 { 
            font-family: 'Playfair Display', serif;
            color: var(--navy); 
            margin-bottom: 2.5rem; 
            font-size: 1.8rem;
        }

        .nurse-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .nurse-item {
            padding: 1.5rem;
            background: var(--white);
            border-radius: 16px;
            border: 1px solid rgba(0, 119, 182, 0.1);
            color: var(--navy);
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .nurse-item:hover {
            background: var(--ocean);
            color: var(--white);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 119, 182, 0.2);
        }
    </style>
</head>
<body>

    <!-- Back Button -->
    <a href="index.html" class="back-btn">← Back</a>

    <header>
        <h1>SPCF Medical Center</h1>
        <p>Professional Nursing Directory</p>
    </header>

    <div class="container">
        <h2>Registered Nurses</h2>
        <div class="nurse-grid">
            <div class="nurse-item">Artezuela, Shanly</div>
            <div class="nurse-item">Cayanan, Shaianne Jade</div>
            <div class="nurse-item">Dizon, Francois Niko</div>
            <div class="nurse-item">Garcia, Genesis</div>
            <div class="nurse-item">Legaspi, Adrian</div>
            <div class="nurse-item">Ocampo, Chlouie</div>
            <div class="nurse-item">Salta, Mariella Dimple</div>
            <div class="nurse-item">Sta Teresa, Aeira Lei</div>
            <div class="nurse-item">Udeh, Ifunanya Esther</div>
        </div>
    </div>

</body>
</html>
